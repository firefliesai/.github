name: Build and Dispatch Event to GitOps Repository

on:
  workflow_call:
    inputs:
      cluster:
        required: true
        type: string
    secrets:
      pushToken:
        required: true
      dispatchToken:
        required: true

jobs:
  build_and_dispatch:
    runs-on: ubuntu-latest
    steps:

    - name: Checkout source
      uses: actions/checkout@v2

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v1
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.pushToken }}

    - name: Setup Docker Buildkit
      uses: docker/setup-buildx-action@v1
      id: buildx
      with:
        install: true

    - name: Extrapolate Environment Variables
      shell: bash
      run: |
        echo "Calculating BRANCH_NAME and IMAGE_NAME"
        IMG=$(echo ghcr.io/${{ github.repository }}/${{ github.event.repository.name }})
        echo "BRANCH_NAME=$(echo ${GITHUB_REF#refs/heads/})" >> $GITHUB_ENV
        echo "IMAGE_NAME=$IMG" >> $GITHUB_ENV
        echo "IMAGE_NAME_WITH_SHA=$IMG:${GITHUB_SHA::8}" >> $GITHUB_ENV

    - name: Build the Docker image
      run: |
        docker build . --file Dockerfile --tag $(echo $IMAGE_NAME_WITH_SHA) --tag $(echo $IMAGE_NAME:latest) --load
        docker push $IMAGE_NAME_WITH_SHA
    
    - name: Download container structure test binary
      shell: bash
      run: |
        curl -LO https://storage.googleapis.com/container-structure-test/latest/container-structure-test-linux-amd64 && chmod +x container-structure-test-linux-amd64 && sudo mv container-structure-test-linux-amd64 /usr/local/bin/container-structure-test
        mkdir -p tests/structure
        cat <<EOF > tests/structure/basic.yaml
        schemaVersion: 2.0.0
        commandTests:
          - name: Node command available
            command: which
            args:
              - node
            expectedOutput:
              - /usr/local/bin/node
          - name: Node Version should be 16
            command: node
            args:
              - --version
            expectedOutput:
              - v15
        EOF

    - name: Runs structure test
      shell: bash
      run: |
        echo "Run test against ${IMAGE_NAME_WITH_SHA}"
        find ./tests/structure -name "*.yaml" -print0 | xargs -0 -I {} container-structure-test test --image ${IMAGE_NAME_WITH_SHA} --config {}

    - name: Dispatch Event to k8s-${{ inputs.cluster }}
      uses: peter-evans/repository-dispatch@v1
      with:
        token: ${{ secrets.dispatchToken }}
        repository: firefliesai/k8s-${{ inputs.cluster }}
        event-type: deployService
        client-payload: '{"repo": "${{ github.event.repository.name }}", "image": "${{ env.IMAGE_NAME_WITH_SHA }}", "branch": "${{ env.BRANCH_NAME }}" }'