name: Token Checker

on:
  pull_request:

jobs:

  check-token:
    strategy:
      fail-fast: false
      matrix:
        token:
          - ACCESS_TOKEN
          - CROSS_REPO_TOKEN
    runs-on: ubuntu-latest
    steps:
      - name: Verify ${{ matrix.token }} user
        run: |
          gh auth login --with-token < $(echo $GITHUB_TOKEN)
        env:
          GITHUB_TOKEN: ${{ secrets[matrix.token] }}