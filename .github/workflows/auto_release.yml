name: Automate deployment

on:
  workflow_call:
    inputs:
      staging_branch:
        default: 'staging'
        required: false
        type: string
      main_branch:
        default: 'main'
        required: false
        type: string

jobs:
  create_release:
    name: Create deployment release
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: firefliesai/.github
          path: firefliesai
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            .github/scripts/auto_release.js
      - name: List the workflow JS files
        run: |
          ls -al firefliesai/.github/scripts
        continue-on-error: true
      - name: Create deployment PR
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const script = require('${{ github.workspace }}/firefliesai/.github/scripts/auto_release.js');

            console.info(JSON.stringify(context))
            console.log(context)

            const isNotMergeCommit = await script.checkMergeCommit({ github, context });
            if (isNotMergeCommit) return;

            context.payload.inputs = {
              main_branch: '${{ inputs.main_branch }}',
              staging_branch: '${{ inputs.staging_branch }}'
            }

            await script.createDeploymentPR({ github, context });
            await script.generateSummaries({ github, context, core });
